name: Generate poster JSON files

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "5 0 * * *"

permissions:
  contents: write

jobs:
  build-posters-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate JSON files
        run: |
          python << 'EOF'
          import os
          import json
          import re
          from datetime import date

          DATE_PATTERN = re.compile(r'(\d{4}-\d{2}-\d{2})')

          def is_active_file(filename):
              match = DATE_PATTERN.search(filename)
              if not match:
                  return True

              try:
                  file_date = date.fromisoformat(match.group(1))
              except ValueError:
                  return True

              today = date.today()

              # plakat widoczny do końca dnia z nazwy pliku
              # znika dopiero następnego dnia po północy
              return file_date >= today

          def get_images(folder):
              if not os.path.exists(folder):
                  return []

              valid_ext = ('.jpg', '.jpeg', '.png', '.webp', '.gif')
              files = []

              for f in sorted(os.listdir(folder)):
                  path = os.path.join(folder, f)

                  if (
                      os.path.isfile(path)
                      and f.lower().endswith(valid_ext)
                      and is_active_file(f)
                  ):
                      files.append(f"{folder}/{f}")

              return files

          moksial_images = get_images("Plakaty-MOKSiAL")
          miasto_images = get_images("Plakaty-Miasto")
          hybryda_images = moksial_images + miasto_images

          outputs = {
              "plakaty-moksial.json": moksial_images,
              "plakaty-miasto.json": miasto_images,
              "plakaty-hybryda.json": hybryda_images
          }

          for output_file, images in outputs.items():
              with open(output_file, "w", encoding="utf-8") as f:
                  json.dump(images, f, ensure_ascii=False, indent=2)
                  f.write("\n")

              print(f"Wygenerowano {output_file}:")
              print(json.dumps(images, ensure_ascii=False, indent=2))
          EOF

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add plakaty-moksial.json plakaty-miasto.json plakaty-hybryda.json

          git diff --cached --quiet || git commit -m "Automatyczna aktualizacja list plakatów"
          git push
