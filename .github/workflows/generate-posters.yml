name: Generate poster JSON files

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "5 0 * * *"

permissions:
  contents: write

jobs:
  build-posters-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate JSON files
        run: |
          python << 'EOF'
          import os
          import json
          import re
          from datetime import date

          # =========================
          # FORMAT DATY W NAZWIE:
          # 2026-04-25_koncert.jpg
          #
          # ZASADY:
          # 1. stare plakaty znikają automatycznie
          # 2. w każdym folderze najbliższe wydarzenia lecą jako pierwsze
          # 3. pliki bez daty trafiają na koniec danego folderu
          # 4. hybryda = najpierw MOKSiAL, potem Miasto
          # =========================

          DATE_PATTERN = re.compile(r'^(\d{4}-\d{2}-\d{2})')

          def is_active_file(filename):
              match = DATE_PATTERN.match(filename)

              # brak daty = plakat zostaje
              if not match:
                  return True

              try:
                  file_date = date.fromisoformat(match.group(1))
              except ValueError:
                  return True

              today = date.today()

              # plakat widoczny do końca dnia z nazwy
              return file_date >= today


          def sort_key(filename):
              match = DATE_PATTERN.match(filename)

              if match:
                  try:
                      file_date = date.fromisoformat(match.group(1))
                      return (0, file_date, filename.lower())
                  except ValueError:
                      pass

              # brak daty = na koniec
              return (1, date.max, filename.lower())


          def get_images(folder):
              if not os.path.exists(folder):
                  return []

              valid_ext = (
                  '.jpg',
                  '.jpeg',
                  '.png',
                  '.webp',
                  '.gif'
              )

              files = []

              for f in os.listdir(folder):
                  path = os.path.join(folder, f)

                  if (
                      os.path.isfile(path)
                      and f.lower().endswith(valid_ext)
                      and is_active_file(f)
                  ):
                      files.append(f"{folder}/{f}")

              # sortowanie w obrębie folderu po dacie
              files.sort(
                  key=lambda x: sort_key(os.path.basename(x))
              )

              return files


          # =========================
          # GŁÓWNE FOLDERY
          # =========================

          moksial_images = get_images("Plakaty-MOKSiAL")
          miasto_images = get_images("Plakaty-Miasto")

          # HYBRYDA:
          # najpierw cały blok MOKSiAL (już posortowany),
          # potem cały blok Miasto (już posortowany)
          hybryda_images = moksial_images + miasto_images

          outputs = {
              "plakaty-moksial.json": moksial_images,
              "plakaty-miasto.json": miasto_images,
              "plakaty-hybryda.json": hybryda_images
          }

          for output_file, images in outputs.items():
              with open(output_file, "w", encoding="utf-8") as f:
                  json.dump(
                      images,
                      f,
                      ensure_ascii=False,
                      indent=2
                  )
                  f.write("\\n")

              print(f"\\nWygenerowano: {output_file}")
              print(
                  json.dumps(
                      images,
                      ensure_ascii=False,
                      indent=2
                  )
              )

          EOF

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            plakaty-moksial.json \
            plakaty-miasto.json \
            plakaty-hybryda.json

          git diff --cached --quiet || git commit -m "Automatyczna aktualizacja list plakatów"

          git push
