<script>
const normalSlideDuration = 8000;
const longSlideDuration = 30000;
const reloadInterval = 900000;
const validExtensions = /\.(jpg|jpeg|png|webp|gif)$/i;
const topMessageIntervalMs = 60000;

function resetSlideState(slide) {
  slide.classList.remove("visible");
  slide.style.transition = "none";
  slide.style.opacity = "0";
  slide.style.transform = "translateX(0) translateY(0) scale(1) rotate(0deg)";
}

function isLongSlide(src) {
  const fileName = (src || "").split('/').pop().toLowerCase();
  return fileName.includes("dluzej");
}

function getSlideDurationForSrc(src) {
  return isLongSlide(src) ? longSlideDuration : normalSlideDuration;
}

function startSlideTimer(durationMs, src) {
  if (!isLongSlide(src)) return;

  slideCountdown = Math.ceil(durationMs / 1000);
  slideTimerEl.textContent = `${slideCountdown} s`;
  slideTimerEl.classList.remove("hidden");

  slideTimerInterval = setInterval(() => {
    slideCountdown -= 1;
    if (slideCountdown <= 0) return;
    slideTimerEl.textContent = `${slideCountdown} s`;
  }, 1000);
}

function showNextSlide() {
  if (!images.length) return;

  const current = getActiveSlide();
  const next = getInactiveSlide();
  const transition = getRandomTransition();
  const nextSrc = images[currentIndex];
  const nextDuration = getSlideDurationForSrc(nextSrc);

  next.onload = () => {
    switchBackground(nextSrc);
    applyTransition(next, current, transition, nextDuration);
    startSlideTimer(nextDuration, nextSrc);

    activeSlide = activeSlide === 0 ? 1 : 0;
    currentIndex = (currentIndex + 1) % images.length;

    scheduleNextSlide(nextDuration);
  };

  next.onerror = () => {
    currentIndex = (currentIndex + 1) % images.length;
    scheduleNextSlide(normalSlideDuration);
  };

  next.src = nextSrc;
}
</script>
