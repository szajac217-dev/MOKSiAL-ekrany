<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plakaty - Wyświetlanie</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

/* tło z plakatu */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(80px) brightness(0.5);
transform:scale(1.2);
z-index:-1;
transition:opacity 2s;
}

/* plakat główny */
#slideshow{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

#slideshow img{
max-width:100%;
max-height:100%;
object-fit:contain;
opacity:0;
position:absolute;
animation:zoom 20s linear forwards;
transition:opacity 2s ease-in-out;
}

/* lekki zoom */
@keyframes zoom{
0%{transform:scale(1)}
100%{transform:scale(1.05)}
}

/* zegar */
#clock{
position:absolute;
top:20px;
right:30px;
color:white;
font-size:40px;
font-weight:bold;
text-shadow:0 0 10px black;
}

/* pasek informacyjny */
#ticker{
position:absolute;
bottom:0;
width:100%;
background:rgba(0,0,0,0.7);
color:white;
padding:15px;
font-size:28px;
white-space:nowrap;
overflow:hidden;
}

#ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 20s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

</style>
</head>

<body>

<div id="bg"></div>

<div id="slideshow">
<img src="Plakaty/plakat1.jpg">
<img src="Plakaty/plakat2.jpg">
<img src="Plakaty/plakat3.jpg">
<img src="Plakaty/plakat4.jpg">
<img src="Plakaty/plakat5.jpg">
</div>

<div id="clock"></div>

<div id="ticker">
<span>Zapraszamy na wydarzenia w naszym ośrodku kultury • Sprawdź aktualny repertuar • Miłego dnia!</span>
</div>

<script>

let slides = document.querySelectorAll("#slideshow img");
let bg = document.getElementById("bg");
let current = 0;

function showSlide(index){

slides.forEach((img)=>{
img.style.opacity=0;
});

slides[index].style.opacity=1;

/* tło z aktualnego plakatu */
bg.style.backgroundImage = "url('" + slides[index].src + "')";

}

function nextSlide(){

current++;

if(current >= slides.length){
current = 0;
}

showSlide(current);

}

showSlide(0);

setInterval(nextSlide,10000);


/* zegar */

function updateClock(){

let now = new Date();
let h = now.getHours().toString().padStart(2,'0');
let m = now.getMinutes().toString().padStart(2,'0');

document.getElementById("clock").innerText = h + ":" + m;

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html><!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<title>MOK - Ekrany informacyjne</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

/* obrazy */

.slide{
position:absolute;
width:100vw;
height:100vh;
object-fit:contain;
opacity:0;
transition:opacity 2s ease-in-out;
animation:zoomEffect 12s ease-in-out;
}

#slide1{z-index:1;}
#slide2{z-index:2;}

/* animacja zoom */

@keyframes zoomEffect{

0%{
transform:scale(1);
}

100%{
transform:scale(1.05);
}

}

/* zegar */

#clock{
position:absolute;
bottom:70px;
right:40px;
color:white;
font-size:48px;
font-weight:600;
background:rgba(0,0,0,0.45);
padding:10px 20px;
border-radius:10px;
z-index:10;
}

/* pasek informacyjny */

#ticker{

position:absolute;
bottom:0;
width:100%;
height:50px;

background:rgba(0,0,0,0.75);
color:white;

display:flex;
align-items:center;

overflow:hidden;
z-index:20;

}

#tickerText{

white-space:nowrap;
font-size:28px;
padding-left:100%;

animation:tickerMove 25s linear infinite;

}

@keyframes tickerMove{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-100%);
}

}

</style>

</head>

<body>

<img id="slide1" class="slide">
<img id="slide2" class="slide">

<div id="clock"></div>

<div id="ticker">
<div id="tickerText">
Zapraszamy na wydarzenia w Miejskim Ośrodku Kultury • Sprawdź aktualny repertuar kina • Koncerty • Warsztaty • Spotkania
</div>
</div>

<script>

const owner = "szajac217-dev"
const repo = "MOKSIAL-ekrany"
const folder = "Plakaty"

let images = []
let index = 0

const slide1 = document.getElementById("slide1")
const slide2 = document.getElementById("slide2")

let activeSlide = slide1

async function loadImages(){

const url = `https://api.github.com/repos/${owner}/${repo}/contents/${folder}`

const response = await fetch(url)
const data = await response.json()

images = data
.filter(file => file.name.match(/\.(jpg|jpeg|png|webp)$/i))
.map(file => file.download_url)

startSlideshow()

}

function startSlideshow(){

function showSlide(){

let nextSlide = activeSlide === slide1 ? slide2 : slide1

nextSlide.src = images[index]
nextSlide.style.opacity = 1
activeSlide.style.opacity = 0

activeSlide = nextSlide

index++
if(index >= images.length){
index = 0
}

}

showSlide()

setInterval(showSlide,8000)

}

loadImages()

/* zegar */

function updateClock(){

const now = new Date()

let hours = now.getHours().toString().padStart(2,"0")
let minutes = now.getMinutes().toString().padStart(2,"0")

document.getElementById("clock").innerText = `${hours}:${minutes}`

}

setInterval(updateClock,1000)
updateClock()

/* odświeżanie */

setInterval(()=>location.reload(),300000)

</script>

</body>
</html>
