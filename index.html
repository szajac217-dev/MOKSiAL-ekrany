<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOKSiAL - Ekrany informacyjne</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition:
        opacity 2s ease-in-out,
        transform 8s linear;
      transform: scale(1.015);
      will-change: opacity, transform;
      background: #000;
    }

    .slide.visible {
      opacity: 1;
      transform: scale(1.0);
    }

    .overlay-top {
      position: absolute;
      top: 18px;
      right: 22px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }

    .clock-box {
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 10px 16px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    .clock {
      color: #ff3b3b;
      font-size: 48px;
      line-height: 1;
      letter-spacing: 4px;
      text-shadow:
        0 0 5px rgba(255, 59, 59, 0.7),
        0 0 12px rgba(255, 59, 59, 0.45),
        0 0 24px rgba(255, 59, 59, 0.25);
      font-family: "Courier New", Courier, monospace;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .date {
      margin-top: 6px;
      color: rgba(255,255,255,0.88);
      font-size: 14px;
      text-align: right;
      letter-spacing: 0.5px;
    }

    .status {
      position: absolute;
      left: 20px;
      bottom: 18px;
      z-index: 20;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      background: rgba(0,0,0,0.35);
      padding: 8px 12px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
    }

    .loading,
    .error {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      text-align: center;
      padding: 30px;
      z-index: 5;
    }

    .error {
      color: #ffb3b3;
    }
  </style>
</head>
<body>
  <div id="app">
    <img id="slideA" class="slide visible" alt="Plakat A">
    <img id="slideB" class="slide" alt="Plakat B">

    <div class="overlay-top">
      <div class="clock-box">
        <div id="clock" class="clock">00:00</div>
        <div id="date" class="date">--</div>
      </div>
    </div>

    <div id="status" class="status">Ładowanie plakatów...</div>
    <div id="loading" class="loading">Ładowanie plakatów...</div>
  </div>

  <script>
    const owner = "szajac217-dev";
    const repo = "MOKSIAL-ekrany";
    const folder = "Plakaty";

    const slideDuration = 8000;     // cały czas jednego plakatu
    const reloadInterval = 300000;  // odświeżenie strony co 5 min
    const validExtensions = /\.(jpg|jpeg|png|webp|gif)$/i;

    let images = [];
    let currentIndex = 0;
    let activeSlide = 0;
    let slideshowStarted = false;

    const slideA = document.getElementById("slideA");
    const slideB = document.getElementById("slideB");
    const statusBox = document.getElementById("status");
    const loadingBox = document.getElementById("loading");
    const clockEl = document.getElementById("clock");
    const dateEl = document.getElementById("date");

    function updateClock() {
      const now = new Date();

      const time = now.toLocaleTimeString("pl-PL", {
        hour: "2-digit",
        minute: "2-digit"
      });

      const date = now.toLocaleDateString("pl-PL", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });

      clockEl.textContent = time;
      dateEl.textContent = date;
    }

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function showError(message) {
      loadingBox.className = "error";
      loadingBox.textContent = message;
      setStatus("Błąd");
    }

    async function loadImages() {
      try {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(folder)}`;
        const response = await fetch(url, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
          throw new Error("Nieprawidłowa odpowiedź API");
        }

        images = data
          .filter(file => file.type === "file" && validExtensions.test(file.name))
          .map(file => file.download_url)
          .filter(Boolean);

        if (images.length === 0) {
          throw new Error(`Brak plakatów w folderze "${folder}"`);
        }

        loadingBox.style.display = "none";
        setStatus(`Załadowano plakatów: ${images.length}`);

        if (!slideshowStarted) {
          startSlideshow();
          slideshowStarted = true;
        }
      } catch (error) {
        console.error(error);
        showError(
          `Nie udało się pobrać plakatów z folderu "${folder}". Sprawdź nazwę repozytorium, folderu oraz czy GitHub Pages jest włączone.`
        );
      }
    }

    function getActiveSlide() {
      return activeSlide === 0 ? slideA : slideB;
    }

    function getInactiveSlide() {
      return activeSlide === 0 ? slideB : slideA;
    }

    function showNextSlide() {
      if (!images.length) return;

      const current = getActiveSlide();
      const next = getInactiveSlide();

      next.src = images[currentIndex];
      next.onload = () => {
        next.classList.add("visible");
        current.classList.remove("visible");

        activeSlide = activeSlide === 0 ? 1 : 0;
        currentIndex = (currentIndex + 1) % images.length;
      };

      next.onerror = () => {
        currentIndex = (currentIndex + 1) % images.length;
      };
    }

    function startSlideshow() {
      const first = getActiveSlide();
      first.src = images[currentIndex];
      first.onload = () => {
        first.classList.add("visible");
        currentIndex = (currentIndex + 1) % images.length;
      };

      setInterval(showNextSlide, slideDuration);
    }

    updateClock();
    setInterval(updateClock, 1000);

    loadImages();
    setInterval(() => location.reload(), reloadInterval);
  </script>
</body>
</html>
