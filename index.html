<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOKSiAL - Ekrany informacyjne</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    :root {
      --topBarTop: 12px;
      --topBarSide: 12px;
      --topBarHeight: 82px;

      --tickerHeight: 190px;
      --tickerQrSpace: 210px;
      --bottomBarSide: 12px;
      --bottomBarBottom: 12px;

      --slideTop: calc(var(--topBarTop) + var(--topBarHeight) + 10px);
      --slideBottom: calc(var(--tickerHeight) + var(--bottomBarBottom) + 6px);
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .slide {
      position: absolute;
      left: 0;
      right: 0;
      top: var(--slideTop);
      bottom: var(--slideBottom);
      width: 100%;
      height: calc(100vh - var(--slideTop) - var(--slideBottom));
      object-fit: contain;
      object-position: top center;
      opacity: 0;
      transform: translateX(0) translateY(0) scale(1) rotate(0deg);
      will-change: opacity, transform;
      background: #000;
    }

    .visible {
      opacity: 1;
    }

    .top-bar {
      position: absolute;
      top: var(--topBarTop);
      left: var(--topBarSide);
      right: var(--topBarSide);
      height: var(--topBarHeight);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-right: 22px;
      z-index: 50;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.14);

      background:
        radial-gradient(circle at 14% 28%, rgba(120, 190, 255, 0.16) 0 18px, transparent 19px),
        radial-gradient(circle at 20% 62%, rgba(255, 255, 255, 0.08) 0 10px, transparent 11px),
        radial-gradient(circle at 36% 36%, rgba(255, 120, 210, 0.10) 0 13px, transparent 14px),
        radial-gradient(circle at 48% 70%, rgba(255, 255, 255, 0.06) 0 9px, transparent 10px),
        radial-gradient(circle at 62% 24%, rgba(120, 180, 255, 0.10) 0 11px, transparent 12px),
        radial-gradient(circle at 78% 58%, rgba(255, 255, 255, 0.07) 0 14px, transparent 15px),
        linear-gradient(110deg,
          rgba(26, 58, 110, 0.46) 0%,
          rgba(62, 33, 108, 0.38) 24%,
          rgba(129, 39, 92, 0.30) 46%,
          rgba(35, 86, 124, 0.36) 72%,
          rgba(18, 28, 52, 0.52) 100%);

      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);

      box-shadow:
        0 10px 34px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -10px 18px rgba(0,0,0,0.08);
    }

    .top-bar::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.16) 0%,
          rgba(255,255,255,0.06) 24%,
          rgba(255,255,255,0.00) 58%
        );
      pointer-events: none;
    }

    .top-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 22%, rgba(255,255,255,0.10) 0 4px, transparent 5px),
        radial-gradient(circle at 29% 48%, rgba(255,255,255,0.08) 0 5px, transparent 6px),
        radial-gradient(circle at 55% 26%, rgba(255,255,255,0.06) 0 3px, transparent 4px),
        radial-gradient(circle at 82% 34%, rgba(255,255,255,0.08) 0 4px, transparent 5px);
      opacity: 0.8;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .clock-box {
      position: relative;
      z-index: 2;
      min-width: 180px;
      padding: 2px 2px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .clock {
      color: #ff5b67;
      font-size: 46px;
      line-height: 1;
      letter-spacing: 4px;
      font-family: "Courier New", monospace;
      font-weight: 700;
      text-align: right;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 0 4px rgba(255, 91, 103, 0.78),
        0 0 12px rgba(255, 91, 103, 0.46),
        0 0 24px rgba(255, 91, 103, 0.22);
    }

    .date {
      margin-top: 6px;
      color: rgba(255, 255, 255, 0.94);
      font-size: 14px;
      text-align: right;
      letter-spacing: 0.4px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.24);
    }

    .ticker-bar {
      position: absolute;
      left: var(--bottomBarSide);
      right: var(--bottomBarSide);
      bottom: var(--bottomBarBottom);
      height: var(--tickerHeight);
      z-index: 60;
      display: flex;
      align-items: center;
      overflow: hidden;
      padding-right: var(--tickerQrSpace);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.14);

      background:
        radial-gradient(circle at 10% 60%, rgba(115, 190, 255, 0.12) 0 18px, transparent 19px),
        radial-gradient(circle at 18% 28%, rgba(255, 255, 255, 0.06) 0 10px, transparent 11px),
        radial-gradient(circle at 42% 74%, rgba(255, 120, 200, 0.08) 0 14px, transparent 15px),
        radial-gradient(circle at 58% 32%, rgba(255,255,255,0.05) 0 8px, transparent 9px),
        radial-gradient(circle at 72% 66%, rgba(255, 208, 120, 0.07) 0 11px, transparent 12px),
        radial-gradient(circle at 86% 30%, rgba(120, 180, 255, 0.08) 0 13px, transparent 14px),
        linear-gradient(100deg,
          rgba(18, 36, 68, 0.54) 0%,
          rgba(34, 36, 82, 0.46) 24%,
          rgba(92, 28, 88, 0.38) 52%,
          rgba(26, 74, 110, 0.40) 76%,
          rgba(14, 24, 42, 0.58) 100%);

      backdrop-filter: blur(18px) saturate(145%);
      -webkit-backdrop-filter: blur(18px) saturate(145%);

      box-shadow:
        0 12px 34px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -10px 18px rgba(0,0,0,0.10);
    }

    .ticker-bar::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 2px;
      background: linear-gradient(
        90deg,
        rgba(255, 90, 120, 0.0) 0%,
        rgba(255, 90, 120, 0.45) 25%,
        rgba(120, 180, 255, 0.40) 50%,
        rgba(255, 215, 80, 0.35) 75%,
        rgba(255, 90, 120, 0.0) 100%
      );
      pointer-events: none;
    }

    .ticker-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.12) 0%,
          rgba(255,255,255,0.04) 24%,
          rgba(255,255,255,0.00) 56%
        );
      pointer-events: none;
    }

    .ticker-wrap {
      position: absolute;
      left: 22px;
      right: var(--tickerQrSpace);
      overflow: hidden;
      white-space: nowrap;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .ticker-track {
      display: inline-block;
      white-space: nowrap;
      will-change: transform;
      transform: translateX(0);
    }

    .ticker-text {
      display: inline-block;
      color: #ffffff;
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-shadow:
        0 2px 10px rgba(0,0,0,0.42),
        0 0 16px rgba(0,0,0,0.20);
      white-space: nowrap;
    }

    .qr-box {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 170px;
      height: 170px;
      border-radius: 20px;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,0.97) 0%,
          rgba(248,248,248,0.94) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow:
        0 12px 34px rgba(0,0,0,0.30),
        inset 0 1px 0 rgba(255,255,255,0.75);
      animation: qrPulse 4s ease-in-out infinite;
      border: 1px solid rgba(255,255,255,0.22);
      z-index: 2;
    }

    .qr-box img {
      width: 150px;
      height: 150px;
      object-fit: contain;
      display: block;
    }

    .message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      color: white;
      font-size: 24px;
      z-index: 80;
      background: #000;
    }

    .error {
      color: #ffb0b0;
    }

    @keyframes qrPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @media (orientation: portrait) {
      :root {
        --topBarTop: 12px;
        --topBarSide: 12px;
        --topBarHeight: 82px;

        --tickerHeight: 190px;
        --tickerQrSpace: 210px;
        --bottomBarSide: 12px;
        --bottomBarBottom: 12px;
      }

      .clock {
        font-size: 38px;
        letter-spacing: 3px;
      }

      .date {
        font-size: 12px;
      }

      .ticker-text {
        font-size: 42px;
      }

      .qr-box {
        width: 170px;
        height: 170px;
      }

      .qr-box img {
        width: 150px;
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <img id="slideA" class="slide visible" alt="Plakat A">
    <img id="slideB" class="slide" alt="Plakat B">

    <div class="top-bar">
      <div class="clock-box">
        <div id="clock" class="clock">00:00</div>
        <div id="date" class="date">--</div>
      </div>
    </div>

    <div class="ticker-bar">
      <div class="ticker-wrap">
        <div class="ticker-track" id="tickerTrack">
          <span class="ticker-text" id="tickerText"></span>
        </div>
      </div>

      <div class="qr-box" id="qrBox">
        <img src="qr.png" alt="Kod QR" onerror="this.parentElement.style.display='none'">
      </div>
    </div>

    <div id="message" class="message">Ładowanie plakatów...</div>
  </div>

  <script>
    const slideDuration = 8000;
    const reloadInterval = 300000;
    const validExtensions = /\.(jpg|jpeg|png|webp|gif)$/i;

    const tickerItems = [
      "Zapraszamy na wydarzenia MOKSiAL w Szklarskiej Porębie",
      "MOKSiAL, ul. Słowackiego 13 - godziny działania: poniedziałek-piątek 8:00-16:00",
      "4Peron - godziny działania: według repertuaru i harmonogramu wydarzeń",
      "Zapraszamy na koncerty, spektakle, kino, warsztaty i spotkania",
      "Chcesz wiedzieć więcej? Wejdź na naszą stronę www.moksial.pl lub zeskanuj kod QR >>>"
    ];

    const tickerSpeed = 150;
    const tickerPauseMs = 5000;

    let images = [];
    let currentIndex = 0;
    let activeSlide = 0;
    let slideshowStarted = false;
    let currentTimer = null;

    const slideA = document.getElementById("slideA");
    const slideB = document.getElementById("slideB");
    const messageBox = document.getElementById("message");
    const clockEl = document.getElementById("clock");
    const dateEl = document.getElementById("date");

    const tickerTrack = document.getElementById("tickerTrack");
    const tickerTextEl = document.getElementById("tickerText");
    const tickerWrap = document.querySelector(".ticker-wrap");

    let tickerAnimationFrame = null;
    let tickerPauseTimeout = null;
    let tickerX = 0;
    let lastTickerTs = 0;
    let tickerTextWidth = 0;
    let tickerWrapWidth = 0;
    let tickerRunning = false;
    let tickerStopX = 0;

    const transitions = [
      { name: "fade", inDuration: 1800, outDuration: 1400 },
      { name: "zoom", inDuration: 2200, outDuration: 1600 },
      { name: "slide-left", inDuration: 1600, outDuration: 1200 },
      { name: "slide-right", inDuration: 1600, outDuration: 1200 },
      { name: "slide-up", inDuration: 1600, outDuration: 1200 },
      { name: "soft-rotate", inDuration: 1800, outDuration: 1400 }
    ];

    function showMessage(text, isError = false) {
      messageBox.textContent = text;
      messageBox.className = isError ? "message error" : "message";
      messageBox.style.display = "flex";
    }

    function hideMessage() {
      messageBox.style.display = "none";
    }

    function updateClock() {
      const now = new Date();

      const time = now.toLocaleTimeString("pl-PL", {
        hour: "2-digit",
        minute: "2-digit"
      });

      const date = now.toLocaleDateString("pl-PL", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });

      clockEl.textContent = time;
      dateEl.textContent = date;
    }

    function buildTickerText() {
      const separator = "   ✦   ";
      tickerTextEl.textContent = tickerItems.join(separator);
    }

    function setupTickerMeasurements() {
      tickerTrack.style.transform = "translateX(0px)";
      tickerTextWidth = tickerTextEl.offsetWidth;
      tickerWrapWidth = tickerWrap.offsetWidth;
      tickerX = tickerWrapWidth;
      tickerStopX = tickerWrapWidth - tickerTextWidth;
      tickerTrack.style.transform = `translateX(${tickerX}px)`;
    }

    function pauseTickerAndRestart() {
      tickerRunning = false;
      tickerTrack.style.transform = `translateX(${tickerStopX}px)`;

      tickerPauseTimeout = setTimeout(() => {
        tickerX = tickerWrapWidth;
        tickerTrack.style.transform = `translateX(${tickerX}px)`;
        lastTickerTs = 0;
        tickerRunning = true;
        tickerAnimationFrame = requestAnimationFrame(tickerStep);
      }, tickerPauseMs);
    }

    function tickerStep(timestamp) {
      if (!tickerRunning) return;

      if (!lastTickerTs) lastTickerTs = timestamp;
      const delta = (timestamp - lastTickerTs) / 1000;
      lastTickerTs = timestamp;

      tickerX -= tickerSpeed * delta;

      if (tickerX <= tickerStopX) {
        pauseTickerAndRestart();
        return;
      }

      tickerTrack.style.transform = `translateX(${tickerX}px)`;
      tickerAnimationFrame = requestAnimationFrame(tickerStep);
    }

    function startTicker() {
      if (tickerAnimationFrame) cancelAnimationFrame(tickerAnimationFrame);
      if (tickerPauseTimeout) clearTimeout(tickerPauseTimeout);

      buildTickerText();
      setupTickerMeasurements();

      tickerRunning = true;
      lastTickerTs = 0;
      tickerAnimationFrame = requestAnimationFrame(tickerStep);
    }

    function getActiveSlide() {
      return activeSlide === 0 ? slideA : slideB;
    }

    function getInactiveSlide() {
      return activeSlide === 0 ? slideB : slideA;
    }

    function resetSlideState(slide) {
      slide.classList.remove("visible");
      slide.style.transition = "none";
      slide.style.opacity = "0";
      slide.style.transform = "translateX(0) translateY(0) scale(1) rotate(0deg)";
    }

    function applyTransition(slideIn, slideOut, transition) {
      resetSlideState(slideIn);

      if (transition.name === "fade") {
        slideIn.style.transform = "scale(1)";
        slideIn.offsetHeight;
        slideIn.style.transition = `opacity ${transition.inDuration}ms ease-in-out`;
        slideOut.style.transition = `opacity ${transition.outDuration}ms ease-in-out`;
        slideIn.style.opacity = "1";
        slideOut.style.opacity = "0";
      }

      if (transition.name === "zoom") {
        slideIn.style.transform = "scale(1.06)";
        slideIn.offsetHeight;
        slideIn.style.transition = `opacity ${transition.inDuration}ms ease-in-out, transform ${slideDuration}ms linear`;
        slideOut.style.transition = `opacity ${transition.outDuration}ms ease-in-out`;
        slideIn.style.opacity = "1";
        slideIn.style.transform = "scale(1)";
        slideOut.style.opacity = "0";
      }

      if (transition.name === "slide-left") {
        slideIn.style.transform = "translateX(6%)";
        slideIn.offsetHeight;
        slideIn.style.transition = `opacity ${transition.inDuration}ms ease, transform ${transition.inDuration}ms ease`;
        slideOut.style.transition = `opacity ${transition.outDuration}ms ease, transform ${transition.outDuration}ms ease`;
        slideIn.style.opacity = "1";
        slideIn.style.transform = "translateX(0)";
        slideOut.style.opacity = "0";
        slideOut.style.transform = "translateX(-3%)";
      }

      if (transition.name === "slide-right") {
        slideIn.style.transform = "translateX(-6%)";
        slideIn.offsetHeight;
        slideIn.style.transition = `opacity ${transition.inDuration}ms ease, transform ${transition.inDuration}ms ease`;
        slideOut.style.transition = `opacity ${transition.outDuration}ms ease, transform ${transition.outDuration}ms ease`;
        slideIn.style.opacity = "1";
        slideIn.style.transform = "translateX(0)";
        slideOut.style.opacity = "0";
        slideOut.style.transform = "translateX(3%)";
      }

      if (transition.name === "slide-up") {
        slideIn.style.transform = "translateY(5%)";
        slideIn.offsetHeight;
        slideIn.style.transition = `opacity ${transition.inDuration}ms ease, transform ${transition.inDuration}ms ease`;
        slideOut.style.transition = `opacity ${transition.outDuration}ms ease, transform ${transition.outDuration}ms ease`;
        slideIn.style.opacity = "1";
        slideIn.style.transform = "translateY(0)";
        slideOut.style.opacity = "0";
        slideOut.style.transform = "translateY(-2%)";
      }

      if (transition.name === "soft-rotate") {
        slideIn.style.transform = "scale(1.02) rotate(-1deg)";
        slideIn.offsetHeight;
        slideIn.style.transition = `opacity ${transition.inDuration}ms ease-in-out, transform ${transition.inDuration}ms ease-in-out`;
        slideOut.style.transition = `opacity ${transition.outDuration}ms ease-in-out, transform ${transition.outDuration}ms ease-in-out`;
        slideIn.style.opacity = "1";
        slideIn.style.transform = "scale(1) rotate(0deg)";
        slideOut.style.opacity = "0";
        slideOut.style.transform = "scale(1.01) rotate(0.5deg)";
      }

      slideIn.classList.add("visible");
      slideOut.classList.remove("visible");
    }

    function getRandomTransition() {
      return transitions[Math.floor(Math.random() * transitions.length)];
    }

    function scheduleNextSlide() {
      if (currentTimer) {
        clearTimeout(currentTimer);
      }
      currentTimer = setTimeout(showNextSlide, slideDuration);
    }

    function showNextSlide() {
      if (!images.length) return;

      const current = getActiveSlide();
      const next = getInactiveSlide();
      const transition = getRandomTransition();

      next.onload = () => {
        applyTransition(next, current, transition);
        activeSlide = activeSlide === 0 ? 1 : 0;
        currentIndex = (currentIndex + 1) % images.length;
        scheduleNextSlide();
      };

      next.onerror = () => {
        currentIndex = (currentIndex + 1) % images.length;
        scheduleNextSlide();
      };

      next.src = images[currentIndex];
    }

    async function loadImages() {
      try {
        const response = await fetch("plakaty.json", { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
          throw new Error("Plik plakaty.json nie zawiera listy");
        }

        images = data.filter(file => validExtensions.test(file));

        if (images.length === 0) {
          throw new Error("Brak plakatów w pliku plakaty.json");
        }

        hideMessage();

        if (!slideshowStarted) {
          startSlideshow();
          slideshowStarted = true;
        }
      } catch (error) {
        console.error(error);
        showMessage(
          'Nie udało się wczytać pliku "plakaty.json". Proszę sprawdzić czy plik istnieje i czy workflow GitHuba go wygenerował.',
          true
        );
      }
    }

    function startSlideshow() {
      const first = getActiveSlide();

      first.onload = () => {
        first.style.transition = "opacity 1200ms ease-in-out";
        first.style.opacity = "1";
        first.classList.add("visible");
        currentIndex = (currentIndex + 1) % images.length;
        scheduleNextSlide();
      };

      first.onerror = () => {
        showMessage("Nie udało się załadować pierwszego plakatu.", true);
      };

      first.src = images[currentIndex];
    }

    updateClock();
    setInterval(updateClock, 1000);

    loadImages();
    startTicker();
    window.addEventListener("resize", startTicker);

    setInterval(() => location.reload(), reloadInterval);
  </script>
</body>

        radial-gradient(circle at 48% 70%, rgba(255, 255, 255, 0.06) 0 9px, transparent 10px),
        radial-gradient(circle at 62% 24%, rgba(120, 180, 255, 0.10) 0 11px, transparent 12px),
        radial-gradient(circle at 78% 58%, rgba(255, 255, 255, 0.07) 0 14px, transparent 15px),
        linear-gradient(110deg,
          rgba(26, 58, 110, 0.46) 0%,
          rgba(62, 33, 108, 0.38) 24%,
          rgba(129, 39, 92, 0.30) 46%,
          rgba(35, 86, 124, 0.36) 72%,
          rgba(18, 28, 52, 0.52) 100%);

      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);

      box-shadow:
        0 10px 34px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -10px 18px rgba(0,0,0,0.08);
    }

    .top-bar::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.16) 0%,
          rgba(255,255,255,0.06) 24%,
          rgba(255,255,255,0.00) 58%
        );
      pointer-events: none;
    }

    .top-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 22%, rgba(255,255,255,0.10) 0 4px, transparent 5px),
        radial-gradient(circle at 29% 48%, rgba(255,255,255,0.08) 0 5px, transparent 6px),
        radial-gradient(circle at 55% 26%, rgba(255,255,255,0.06) 0 3px, transparent 4px),
        radial-gradient(circle at 82% 34%, rgba(255,255,255,0.08) 0 4px, transparent 5px);
      opacity: 0.8;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .clock-box {
      position: relative;
      z-index: 2;
      min-width: 180px;
      padding: 2px 2px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .clock {
      color: #ff5b67;
      font-size: 46px;
      line-height: 1;
      letter-spacing: 4px;
      font-family: "Courier New", monospace;
      font-weight: 700;
      text-align: right;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 0 4px rgba(255, 91, 103, 0.78),
        0 0 12px rgba(255, 91, 103, 0.46),
        0 0 24px rgba(255, 91, 103, 0.22);
    }

    .date {
      margin-top: 6px;
      color: rgba(255, 255, 255, 0.94);
      font-size: 14px;
      text-align: right;
      letter-spacing: 0.4px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.24);
    }

    .ticker-bar {
      position: absolute;
      left: var(--bottomBarSide);
      right: var(--bottomBarSide);
      bottom: var(--bottomBarBottom);
      height: var(--tickerHeight);
      z-index: 60;
      display: flex;
      align-items: center;
      overflow: hidden;
      padding-right: var(--tickerQrSpace);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.14);

      background:
        radial-gradient(circle at 10% 60%, rgba(115, 190, 255, 0.12) 0 18px, transparent 19px),
        radial-gradient(circle at 18% 28%, rgba(255, 255, 255, 0.06) 0 10px, transparent 11px),
        radial-gradient(circle at 42% 74%, rgba(255, 120, 200, 0.08) 0 14px, transparent 15px),
        radial-gradient(circle at 58% 32%, rgba(255,255,255,0.05) 0 8px, transparent 9px),
        radial-gradient(circle at 72% 66%, rgba(255, 208, 120, 0.07) 0 11px, transparent 12px),
        radial-gradient(circle at 86% 30%, rgba(120, 180, 255, 0.08) 0 13px, transparent 14px),
        linear-gradient(100deg,
          rgba(18, 36, 68, 0.54) 0%,
          rgba(34, 36, 82, 0.46) 24%,
          rgba(92, 28, 88, 0.38) 52%,
          rgba(26, 74, 110, 0.40) 76%,
          rgba(14, 24, 42, 0.58) 100%);

      backdrop-filter: blur(18px) saturate(145%);
      -webkit-backdrop-filter: blur(18px) saturate(145%);

      box-shadow:
        0 12px 34px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -10px 18px rgba(0,0,0,0.10);
    }

    .ticker-bar::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 2px;
      background: linear-gradient(
        90deg,
        rgba(255, 90, 120, 0.0) 0%,
        rgba(255, 90, 120, 0.45) 25%,
        rgba(120, 180, 255, 0.40) 50%,
        rgba(255, 215, 80, 0.35) 75%,
        rgba(255, 90, 120, 0.0) 100%
      );
      pointer-events: none;
    }

    .ticker-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.12) 0%,
          rgba(255,255,255,0.04) 24%,
          rgba(255,255,255,0.00) 56%
        );
      pointer-events: none;
    }

    .ticker-wrap {
      position: absolute;
      left: 22px;
      right: var(--tickerQrSpace);
      overflow: hidden;
      white-space: nowrap;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .ticker-track {
      display: inline-block;
      white-space: nowrap;
      will-change: transform;
      transform: translateX(0);
    }

    .ticker-text {
      display: inline-block;
      color: #ffffff;
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-shadow:
        0 2px 10px rgba(0,0,0,0.42),
        0 0 16px rgba(0,0,0,0.20);
      white-space: nowrap;
    }

    .qr-box {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 170px;
      height: 170px;
      border-radius: 20px;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,0.97) 0%,
          rgba(248,248,248,0.94) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow:
        0 12px 34px rgba(0,0,0,0.30),
        inset 0 1px 0 rgba(255,255,255,0.75);
      animation: qrPulse 4s ease-in-out infinite;
      border: 1px solid rgba(255,255,255,0.22);
      z-index: 2;
    }

    .qr-box img {
      width: 150px;
      height: 150px;
      object-fit: contain;
      display: block;
    }

    .message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      color: white;
      font-size: 24px;
      z-index: 80;
      background: #000;
    }

    .error {
      color: #ffb0b0;
    }

    @keyframes qrPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @media (orientation: portrait) {
      :root {
        --topBarTop: 12px;
        --topBarSide: 12px;
        --topBarHeight: 82px;

        --tickerHeight: 190px;
        --tickerQrSpace: 210px;
        --bottomBarSide: 12px;
        --bottomBarBottom: 12px;
      }

      .clock {
        font-size: 38px;
        letter-spacing: 3px;
      }

      .date {
        font-size: 12px;
      }

      .ticker-text {
        font-size: 42px;
      }

      .qr-box {
        width: 170px;
        height: 170px;
      }

      .qr-box img {
        width: 150px;
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <img id="slideA" class="slide visible" alt="Plakat A">
    <img id="slideB" class="slide" alt="Plakat B">

    <div class="top-bar">
      <div class="clock-box">
        <div id="clock" class="clock">00:00</div>
        <div id="date" class="date">--</div>
      </div>
    </div>

    <div class="ticker-bar">
      <div class="ticker-wrap">
        <div class="ticker-track" id="tickerTrack">
          <span class="ticker-text" id="tickerText"></span>
        </div>
      </div>

      <div class="qr-box" id="qrBox">
        <img src="qr.png" alt="Kod QR" onerror="this.parentElement.style.display='none'">
      </div>
    </div>

    <div id="message" class="message">Ładowanie plakatów...</div>
  </div>

  <script>
    const slideDuration = 8000;
    const reloadInterval = 300000;
    const validExtensions = /\.(jpg|jpeg|png|webp|gif)$/i;

    const tickerItems = [
      "Zapraszamy na wydarzenia MOKSiAL w Szklarskiej Porębie",
      "MOKSiAL, ul. Słowackiego 13 - godziny działania: poniedziałek-piątek 8:00-16:00",
      "4Peron - godziny działania: według repertuaru i harmonogramu wydarzeń",
      "Zapraszamy na koncerty, spektakle, kino, warsztaty i spotkania",
      "Chcesz wiedzieć więcej? Wejdź na naszą stronę www.moksial.pl lub zeskanuj kod QR >>>"
    ];

    const tickerSpeed = 55;
    const tickerPauseMs = 5000;

    let images = [];
    let currentIndex = 0;
    let activeSlide = 0;
    let slideshowStarted = false;
    let currentTimer = null;

    const slideA = document.getElementById("slideA");
    const slideB = document.getElementById("slideB");
    const messageBox = document.getElementById("message");
    const clockEl = document.getElementById("clock");
    const dateEl = document.getElementById("date");

    const tickerTrack = document.getElementById("tickerTrack");
    const tickerTextEl = document.getElementById("tickerText");
    const tickerWrap = document.querySelector(".ticker-wrap");

    let tickerAnimationFrame = null;
    let tickerPauseTimeout = null;
    let tickerX = 0;
    let lastTickerTs = 0;
    let tickerTextWidth = 0;
    let tickerWrapWidth = 0;
    let tickerRunning = false;
    let tickerStopX = 0;

    const transitions = [
      { name: "fade", inDuration: 1800, outDuration: 1400 },
      { name: "zoom", inDuration: 2200, outDuration: 1600 },
      { name: "slide-left", inDuration: 1600, outDuration: 1200 },
      { name: "slide-right", inDuration: 1600, outDuration: 1200 },
      { name: "slide-up", inDuration: 1600, outDuration: 1200 },
      { name: "soft-rotate", inDuration: 1800, outDuration: 1400 }
    ];

    function showMessage(text, isError = false) {
      messageBox.textContent = text;
      messageBox.className = isError ? "message error" : "message";
      messageBox.style.display = "flex";
    }

    function hideMessage() {
      messageBox.style.display = "none";
    }

    function updateClock() {
      const now = new Date();

      const time = now.toLocaleTimeString("pl-PL", {
        hour: "2-digit",
        minute: "2-digit"
      });

      const date = now.toLocaleDateString("pl-PL", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });

      clockEl.textContent = time;
      dateEl.textContent = date;
    }

    function buildTickerText() {
      const separator = "   ✦   ";
      tickerTextEl.textContent = tickerItems.join(separator);
    }

    function setupTickerMeasurements() {
      tickerTrack.style.transform = "translateX(0px)";
      tickerTextWidth = tickerTextEl.offsetWidth;
      tickerWrapWidth = tickerWrap.offsetWidth;
      tickerX = tickerWrapWidth;
      tickerStopX = tickerWrapWidth - tickerTextWidth;
      tickerTrack.style.transform = `translateX(${tickerX}px)`;
    }

    function pauseTickerAndRestart() {
      tickerRunning = false;
      tickerTrack.style.transform = `translateX(${tickerStopX}px)`;

      tickerPauseTimeout = setTimeout(() => {
        tickerX = tickerWrapWidth;
        tickerTrack.style.transform = `translateX(${tickerX}px)`;
        lastTickerTs = 0;
        tickerRunning = true;
        tickerAnimationFrame = requestAnimationFrame(tickerStep);
      }, tickerPauseMs);
    }

    function tickerStep(timestamp) {
      if (!tickerRunning) return;

      if (!lastTickerTs) lastTickerTs = timestamp;
      const delta = (timestamp - lastTickerTs) / 1000;
      lastTickerTs = timestamp;

      tickerX -= tickerSpeed * delta;

      if (tickerX <= tickerStopX) {
        pauseTickerAndRestart();
        return;
      }

      tickerTrack.style.transform = `translateX(${tickerX}px)`;
      tickerAnimationFrame = requestAnimationFrame(tickerStep);
    }

    function startTicker() {
      if (tickerAnimationFrame) cancelAnimationFrame(tickerAnimationFrame);
      if (tickerPauseTimeout) clearTimeout(tickerPauseTimeout);

      buildTickerText();
      setupTickerMeasurements();

      tickerRunning = true;
      lastTickerTs = 0;
      tickerAnimationFrame = requestAnimationFrame(tickerStep);
    }

    function getActiveSlide() {
      return activeSlide === 0 ? slideA : slideB;
    }

    function getInactiveSlide() {
      return activeSlide === 0 ? slideB : slideA;
    }

    function resetSlideState(slide) {
      slide.classList.remove("visible");
      slide.style.transition = "none";
      slide.style.opacity = "0";
      slide.style.transform = "translateX(0) translateY(0) scale(1) rotate(0deg)";
    }

    function applyTransition(slideIn, slideOut, transition) {
      resetSlideState(slideIn);

      if (transition.name === "fade") {
        slideIn.style.transform = "scale(1)";
        slideIn.offsetHeight;
        slideIn.style.transition = `opacity ${transition.inDuration}ms ease-in-out`;
        slideOut.style.transition = `opacity ${transition.outDuration}ms ease-in-out`;
        slideIn.style.opacity = "1";
        slideOut.style.opacity = "0";
      }

      if (transition.name === "zoom") {
        slideIn.style.transform = "scale(1.06)";
        slideIn.offsetHeight;
        slideIn.style.transition = `opacity ${transition.inDuration}ms ease-in-out, transform ${slideDuration}ms linear`;
        slideOut.style.transition = `opacity ${transition.outDuration}ms ease-in-out`;
        slideIn.style.opacity = "1";
        slideIn.style.transform = "scale(1)";
        slideOut.style.opacity = "0";
      }

      if (transition.name === "slide-left") {
        slideIn.style.transform = "translateX(6%)";
        slideIn.offsetHeight;
        slideIn.style.transition = `opacity ${transition.inDuration}ms ease, transform ${transition.inDuration}ms ease`;
        slideOut.style.transition = `opacity ${transition.outDuration}ms ease, transform ${transition.outDuration}ms ease`;
        slideIn.style.opacity = "1";
        slideIn.style.transform = "translateX(0)";
        slideOut.style.opacity = "0";
        slideOut.style.transform = "translateX(-3%)";
      }

      if (transition.name === "slide-right") {
        slideIn.style.transform = "translateX(-6%)";
        slideIn.offsetHeight;
        slideIn.style.transition = `opacity ${transition.inDuration}ms ease, transform ${transition.inDuration}ms ease`;
        slideOut.style.transition = `opacity ${transition.outDuration}ms ease, transform ${transition.outDuration}ms ease`;
        slideIn.style.opacity = "1";
        slideIn.style.transform = "translateX(0)";
        slideOut.style.opacity = "0";
        slideOut.style.transform = "translateX(3%)";
      }

      if (transition.name === "slide-up") {
        slideIn.style.transform = "translateY(5%)";
        slideIn.offsetHeight;
        slideIn.style.transition = `opacity ${transition.inDuration}ms ease, transform ${transition.inDuration}ms ease`;
        slideOut.style.transition = `opacity ${transition.outDuration}ms ease, transform ${transition.outDuration}ms ease`;
        slideIn.style.opacity = "1";
        slideIn.style.transform = "translateY(0)";
        slideOut.style.opacity = "0";
        slideOut.style.transform = "translateY(-2%)";
      }

      if (transition.name === "soft-rotate") {
        slideIn.style.transform = "scale(1.02) rotate(-1deg)";
        slideIn.offsetHeight;
        slideIn.style.transition = `opacity ${transition.inDuration}ms ease-in-out, transform ${transition.inDuration}ms ease-in-out`;
        slideOut.style.transition = `opacity ${transition.outDuration}ms ease-in-out, transform ${transition.outDuration}ms ease-in-out`;
        slideIn.style.opacity = "1";
        slideIn.style.transform = "scale(1) rotate(0deg)";
        slideOut.style.opacity = "0";
        slideOut.style.transform = "scale(1.01) rotate(0.5deg)";
      }

      slideIn.classList.add("visible");
      slideOut.classList.remove("visible");
    }

    function getRandomTransition() {
      return transitions[Math.floor(Math.random() * transitions.length)];
    }

    function scheduleNextSlide() {
      if (currentTimer) {
        clearTimeout(currentTimer);
      }
      currentTimer = setTimeout(showNextSlide, slideDuration);
    }

    function showNextSlide() {
      if (!images.length) return;

      const current = getActiveSlide();
      const next = getInactiveSlide();
      const transition = getRandomTransition();

      next.onload = () => {
        applyTransition(next, current, transition);
        activeSlide = activeSlide === 0 ? 1 : 0;
        currentIndex = (currentIndex + 1) % images.length;
        scheduleNextSlide();
      };

      next.onerror = () => {
        currentIndex = (currentIndex + 1) % images.length;
        scheduleNextSlide();
      };

      next.src = images[currentIndex];
    }

    async function loadImages() {
      try {
        const response = await fetch("plakaty.json", { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
          throw new Error("Plik plakaty.json nie zawiera listy");
        }

        images = data.filter(file => validExtensions.test(file));

        if (images.length === 0) {
          throw new Error("Brak plakatów w pliku plakaty.json");
        }

        hideMessage();

        if (!slideshowStarted) {
          startSlideshow();
          slideshowStarted = true;
        }
      } catch (error) {
        console.error(error);
        showMessage(
          'Nie udało się wczytać pliku "plakaty.json". Proszę sprawdzić czy plik istnieje i czy workflow GitHuba go wygenerował.',
          true
        );
      }
    }

    function startSlideshow() {
      const first = getActiveSlide();

      first.onload = () => {
        first.style.transition = "opacity 1200ms ease-in-out";
        first.style.opacity = "1";
        first.classList.add("visible");
        currentIndex = (currentIndex + 1) % images.length;
        scheduleNextSlide();
      };

      first.onerror = () => {
        showMessage("Nie udało się załadować pierwszego plakatu.", true);
      };

      first.src = images[currentIndex];
    }

    updateClock();
    setInterval(updateClock, 1000);

    loadImages();
    startTicker();
    window.addEventListener("resize", startTicker);

    setInterval(() => location.reload(), reloadInterval);
  </script>
</body>
</html>
