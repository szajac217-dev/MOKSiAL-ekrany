<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MOKSIAL - Ekrany</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, sans-serif;
}

#background{
position:fixed;
width:100%;
height:100%;
z-index:0;
transition:background 3s ease;
}

#slideshow{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
z-index:2;
}

#slide{
max-width:100%;
max-height:100%;
object-fit:contain;
opacity:0;
transition:opacity 2s ease-in-out;
animation:zoom 20s linear forwards;
}

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.05)}
}

#clock{
position:absolute;
top:20px;
right:30px;
color:white;
font-size:40px;
font-weight:bold;
z-index:3;
}

#ticker{
position:absolute;
bottom:0;
width:100%;
background:rgba(0,0,0,0.6);
color:white;
font-size:28px;
padding:15px;
white-space:nowrap;
overflow:hidden;
z-index:3;
}

#ticker span{
display:inline-block;
padding-left:100%;
animation:ticker 20s linear infinite;
}

@keyframes ticker{
from{transform:translateX(0)}
to{transform:translateX(-100%)}
}

/* pionowe ekrany */

@media (orientation: portrait){

#slide{
max-width:100%;
max-height:90%;
}

#clock{
font-size:28px;
top:10px;
right:15px;
}

#ticker{
font-size:20px;
padding:10px;
}

}

</style>
</head>

<body>

<div id="background"></div>

<div id="slideshow">
<img id="slide">
</div>

<div id="clock"></div>

<div id="ticker">
<span>Zapraszamy na wydarzenia w MOKSiAL • Kino za Rogiem • Koncerty • Warsztaty • Wystawy</span>
</div>

<script>

const owner="szajac217-dev"
const repo="MOKSIAL-ekrany"
const folder="Plakaty"

let images=[]
let index=0

async function loadImages(){

const url=`https://api.github.com/repos/${owner}/${repo}/contents/${folder}`

const response=await fetch(url)
const data=await response.json()

images=data
.filter(file=>file.name.match(/\.(jpg|jpeg|png|webp)$/i))
.map(file=>file.download_url)

startSlideshow()

}

function startSlideshow(){

showSlide()

setInterval(showSlide,10000)

}

function showSlide(){

const img=document.getElementById("slide")

img.style.opacity=0

setTimeout(()=>{

img.src=images[index]

generateBackground(img)

img.style.opacity=1

index++

if(index>=images.length){
index=0
}

},1000)

}

function generateBackground(img){

img.onload=function(){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=50
canvas.height=50

ctx.drawImage(img,0,0,50,50)

const data=ctx.getImageData(0,0,50,50).data

let r=0,g=0,b=0,count=0

for(let i=0;i<data.length;i+=4){

r+=data[i]
g+=data[i+1]
b+=data[i+2]
count++

}

r=Math.floor(r/count)
g=Math.floor(g/count)
b=Math.floor(b/count)

document.getElementById("background").style.background=
`linear-gradient(135deg, rgb(${r},${g},${b}), black)`

}

}

function updateClock(){

const now=new Date()

let h=now.getHours().toString().padStart(2,"0")
let m=now.getMinutes().toString().padStart(2,"0")

document.getElementById("clock").innerText=`${h}:${m}`

}

setInterval(updateClock,1000)

updateClock()

loadImages()

</script>

</body>
</html>
